<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scoreboard</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="home-counter">
        <h3>HOME</h3>
        <h2 id="count1">0</h2>
        <div class="buttons">
          <button class="inc1-btn1" onclick="inc11()">+1</button>
          <button class="inc2-btn1" onclick="inc21()">+2</button>
          <button class="inc3-btn1" onclick="inc31()">+3</button>
        </div>
      </div>
      <button id="reset" onclick="reset()">RESET</button>
      <div class="guest-counter">
        <h3>GUEST</h3>
        <h2 id="count2">0</h2>
        <div class="buttons">
          <button class="inc1-btn2" onclick="inc12()">+1</button>
          <button class="inc2-btn2" onclick="inc22()">+2</button>
          <button class="inc3-btn2" onclick="inc32()">+3</button>
        </div>
      </div>
    </div>
  </body>
</html>
